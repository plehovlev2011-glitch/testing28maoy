<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контрольная работа: Плехов Лев</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-outline: #79747E;
            --md-sys-color-error: #B3261E;
            --md-sys-color-success: #2E7D32;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f6f8fc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--md-sys-color-surface);
            width: 90%;
            max-width: 500px;
            padding: 32px;
            border-radius: 28px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .timer-badge {
            display: inline-block;
            background: #EADDFF;
            color: #21005D;
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        h1 { font-size: 24px; color: #1C1B1F; margin-bottom: 8px; }
        h2 { font-size: 18px; color: #49454F; font-weight: 400; margin-bottom: 24px; }

        .btn-main {
            background: var(--md-sys-color-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-main:hover { box-shadow: 0 2px 8px rgba(103, 80, 164, 0.3); }

        .option-btn {
            display: block;
            width: 100%;
            margin: 12px 0;
            padding: 16px;
            text-align: left;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 12px;
            background: transparent;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) { background: #f0edf8; }

        .feedback {
            margin-top: 20px;
            font-weight: 700;
            font-size: 20px;
            min-height: 30px;
        }

        .hidden { display: none; }
        
        #progress {
            font-size: 14px;
            color: var(--md-sys-color-outline);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card" id="start-screen">
    <div class="timer-badge">90 минут</div>
    <h1>Плехов Лев Александрович</h1>
    <h2>МАОУ ЛИнТех28 г.Киров</h2>
    <p>Домашняя работа: Синус/Косинус и уравнения</p>
    <button class="btn-main" onclick="startQuiz()">Начать тест</button>
</div>

<div class="card hidden" id="quiz-screen">
    <div id="timer-display" class="timer-badge">90:00</div>
    <div id="progress">Вопрос 1 из 40</div>
    <div id="question-text" style="font-size: 20px; margin-bottom: 20px;"></div>
    <div id="options-container"></div>
    <div id="feedback-text" class="feedback"></div>
</div>

<div class="card hidden" id="end-screen">
    <h1>Работа завершена!</h1>
    <p id="final-score"></p>
    <button class="btn-main" onclick="location.reload()">На главную</button>
</div>

<script>
    const questions = [
        // ТЕОРИЯ ГЕОМЕТРИИ (20 вопросов)
        { q: "Как называется отношение прилежащего катета к гипотенузе?", a: ["Косинус", "Синус", "Тангенс", "Котангенс"], c: 0 },
        { q: "Чему равна сумма квадратов синуса и косинуса одного и того же угла?", a: ["1", "0", "0.5", "$$\\pi$$"], c: 0 },
        { q: "В прямоугольном треугольнике синус 30° равен:", a: ["$$1/2$$", "$$\\sqrt{3}/2$$", "1", "$$\\sqrt{2}/2$$"], c: 0 },
        { q: "В прямоугольном треугольнике косинус 60° равен:", a: ["$$1/2$$", "$$0.5$$", "Верно оба варианта", "0"], c: 2 },
        { q: "Синусом угла в 90° является число:", a: ["1", "0", "0.5", "-1"], c: 0 },
        { q: "Косинусом угла в 0° является число:", a: ["1", "0", "0.5", "Не определен"], c: 0 },
        { q: "Если синус угла растет (от 0 до 90°), то косинус этого угла...", a: ["Уменьшается", "Растет", "Не меняется", "Становится отрицательным"], c: 0 },
        { q: "Чему равен косинус 90°?", a: ["0", "1", "$$1/2$$", "$$\\sqrt{2}/2$$"], c: 0 },
        { q: "Как называется сторона, лежащая против прямого угла?", a: ["Гипотенуза", "Катет", "Медиана", "Биссектриса"], c: 0 },
        { q: "Может ли синус острого угла быть равен 1.5?", a: ["Нет, всегда меньше или равен 1", "Да", "Только в тупоугольном треугольнике", "Только в равнобедренном"], c: 0 },
        { q: "Тангенс угла $\\alpha$ — это отношение:", a: ["$$\\sin\\alpha / \\cos\\alpha$$", "$$\\cos\\alpha / \\sin\\alpha$$", "Катета к катету", "Варианты 1 и 3 верны"], c: 3 },
        { q: "Чему равен $\\sin 45^\\circ$?", a: ["$$\\frac{\\sqrt{2}}{2}$$", "$$\\frac{1}{2}$$", "$$1$$", "$$\\frac{\\sqrt{3}}{2}$$"], c: 0 },
        { q: "В треугольнике ABC с прямым углом C, $\\cos B$ — это:", a: ["BC / AB", "AC / AB", "AC / BC", "BC / AC"], c: 0 },
        { q: "Справедливо ли тождество $\\tan \\alpha \\cdot \\cot \\alpha = 1$?", a: ["Да", "Нет", "Только для 45 градусов", "Никогда"], c: 0 },
        { q: "Синус какого угла равен $$\\sqrt{3}/2$$?", a: ["60°", "30°", "45°", "0°"], c: 0 },
        { q: "Если $\\sin \\alpha = 0.6$ и угол острый, то $\\cos \\alpha$ равен:", a: ["0.8", "0.4", "1", "0.6"], c: 0 },
        { q: "Как называется катет, образующий угол вместе с гипотенузой?", a: ["Прилежащий", "Противолежащий", "Гипотенуза", "Высота"], c: 0 },
        { q: "Косинус 45° равен:", a: ["$$\\frac{\\sqrt{2}}{2}$$", "$$\\frac{\\sqrt{3}}{2}$$", "$$0.5$$", "$$1$$"], c: 0 },
        { q: "В треугольнике катет равен 3, гипотенуза 5. Чему равен синус противолежащего угла?", a: ["0.6", "0.8", "0.75", "1"], c: 0 },
        { q: "Зависит ли значение синуса от размеров треугольника (при равных углах)?", a: ["Нет", "Да", "Зависит только от гипотенузы", "Зависит только от площади"], c: 0 },

        // ПРАКТИКА АЛГЕБРА (20 вопросов)
        { q: "Найдите дискриминант уравнения $$x^2 - 6x + 5 = 0$$", a: ["16", "4", "25", "36"], c: 0 },
        { q: "Решите уравнение $$x^2 - 9 = 0$$", a: ["$$3; -3$$", "3", "0", "9"], c: 0 },
        { q: "Сколько корней у уравнения $$x^2 + 2x + 5 = 0$$?", a: ["Нет корней", "1 корень", "2 корня", "3 корня"], c: 0 },
        { q: "Найдите дискриминант $$2x^2 + 5x - 3 = 0$$", a: ["49", "25", "1", "13"], c: 0 },
        { q: "Корень уравнения $$x^2 - 10x + 25 = 0$$ это:", a: ["5", "-5", "0", "25"], c: 0 },
        { q: "В уравнении $$x^2 - 5x = 0$$ корни равны:", a: ["0 и 5", "5", "0 и -5", "1 и 5"], c: 0 },
        { q: "Найдите $D$ для $$3x^2 - 4x + 1 = 0$$", a: ["4", "16", "1", "0"], c: 0 },
        { q: "Корни уравнения $$x^2 - 7x + 10 = 0$$:", a: ["2 и 5", "-2 и -5", "1 и 10", "3 и 4"], c: 0 },
        { q: "Какое уравнение не имеет корней?", a: ["$$x^2 + 1 = 0$$", "$$x^2 - 1 = 0$$", "$$x^2 = 0$$", "$$x^2 + x = 0$$"], c: 0 },
        { q: "Дискриминант уравнения $$x^2 - 2x + 1 = 0$$ равен:", a: ["0", "4", "2", "-4"], c: 0 },
        { q: "Решите уравнение $$2x^2 = 18$$", a: ["3; -3", "9", "3", "18"], c: 0 },
        { q: "Найдите сумму корней уравнения $$x^2 - 5x + 6 = 0$$ (по Виету):", a: ["5", "6", "-5", "1"], c: 0 },
        { q: "Найдите произведение корней $$x^2 - 8x + 12 = 0$$:", a: ["12", "8", "-12", "1"], c: 0 },
        { q: "Решите $$x^2 + 4x = 0$$", a: ["0; -4", "0; 4", "4", "-4"], c: 0 },
        { q: "Уравнение $$ax^2 + c = 0$$ при $$a=1, c=4$$:", a: ["Не имеет корней", "2; -2", "0", "4"], c: 0 },
        { q: "Дискриминант $$x^2 - 4x - 5 = 0$$:", a: ["36", "16", "4", "20"], c: 0 },
        { q: "Найдите корни $$x^2 - x - 6 = 0$$", a: ["3; -2", "-3; 2", "1; 6", "-1; -6"], c: 0 },
        { q: "Если $$D = 121$$, то $$\\sqrt{D}$$ равен:", a: ["11", "12", "21", "1.1"], c: 0 },
        { q: "Уравнение $$5x^2 = 0$$ имеет корень:", a: ["0", "5", "1", "Нет корней"], c: 0 },
        { q: "Найдите корень $$x^2 + 12x + 36 = 0$$", a: ["-6", "6", "0", "36"], c: 0 }
    ];

    let currentQ = 0;
    let score = 0;
    let timer;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        startTimer(90 * 60);
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        document.getElementById('progress').innerText = `Вопрос ${currentQ + 1} из ${questions.length}`;
        document.getElementById('question-text').innerHTML = q.q;
        document.getElementById('feedback-text').innerText = "";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.a.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerHTML = option;
            btn.onclick = () => selectOption(index, btn);
            container.appendChild(btn);
        });

        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function selectOption(index, btn) {
        const correct = questions[currentQ].c;
        const feedback = document.getElementById('feedback-text');
        const buttons = document.querySelectorAll('.option-btn');

        buttons.forEach(b => b.disabled = true);

        if (index === correct) {
            score++;
            const positive = ["Супер!", "Ого!", "Молодец!"];
            feedback.innerText = positive[Math.floor(Math.random() * positive.length)];
            feedback.style.color = "var(--md-sys-color-success)";
            btn.style.borderColor = "var(--md-sys-color-success)";
            btn.style.background = "#e8f5e9";
        } else {
            feedback.innerText = "Ой...";
            feedback.style.color = "var(--md-sys-color-error)";
            btn.style.borderColor = "var(--md-sys-color-error)";
            btn.style.background = "#ffebee";
        }

        setTimeout(() => {
            currentQ++;
            if (currentQ < questions.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }, 1200);
    }

    function startTimer(seconds) {
        let time = seconds;
        const display = document.getElementById('timer-display');
        timer = setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (time <= 0) {
                clearInterval(timer);
                finishQuiz();
            }
            time--;
        }, 1000);
    }

    function finishQuiz() {
        clearInterval(timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Твой результат: ${score} из ${questions.length}`;
    }
</script>

</body>
</html>
